name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["20", "22"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Help text loads
        run: node bin/chronicle.js help

      - name: Adapters command
        run: node bin/chronicle.js adapters

      - name: npm pack contents
        run: npm pack --dry-run
